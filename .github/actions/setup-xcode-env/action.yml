name: Setup Xcode Environment
description: Preflight Xcode 16.2, create Development.xcconfig, discover simulator
outputs:
  device_id:
    description: "Simulator UDID"
    value: ${{ steps.simulator.outputs.device_id }}
  device:
    description: "Symbolic simulator destination"
    value: ${{ steps.simulator.outputs.device }}
runs:
  using: composite
  steps:
    - name: Preflight — verify Xcode 16.2 available
      shell: bash
      run: |
        if [ ! -d /Applications/Xcode_16.2.app ]; then
          echo "::error::Xcode 16.2 not installed on this runner image."
          echo "Available Xcodes:"
          ls /Applications | grep -i xcode
          exit 1
        fi
    - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd  # v1.6.0
      with:
        xcode-version: "16.2"
    - name: Create Development.xcconfig (CI placeholder)
      shell: bash
      run: |
        cat > Development.xcconfig << 'EOF'
        MEDIA_DOWNLOADER_API_KEY = CI_PLACEHOLDER_KEY
        MEDIA_DOWNLOADER_BASE_PATH = https:/$()/example.com/
        EOF
    - name: Discover iOS Simulator (dynamic)
      id: simulator
      shell: bash
      run: |
        # Dynamic simulator discovery
        RUNTIME=$(xcrun simctl list runtimes -j \
          | jq -r '.runtimes | map(select(.platform == "iOS" and .isAvailable)) | sort_by(.version) | last | .identifier')
        DEVICE_ID=$(xcrun simctl list devices -j \
          | jq -r --arg rt "$RUNTIME" '.devices[$rt] // [] | map(select(.isAvailable)) | map(select(.name | test("iPhone 1[5-9]|iPhone 2[0-9]"))) | sort_by(.name) | last | .udid')
        DEVICE_NAME=$(xcrun simctl list devices -j \
          | jq -r --arg rt "$RUNTIME" --arg id "$DEVICE_ID" '.devices[$rt] // [] | map(select(.udid == $id)) | .[0].name')
        OS_VERSION=$(xcrun simctl list runtimes -j \
          | jq -r --arg rt "$RUNTIME" '.runtimes | map(select(.identifier == $rt)) | .[0].version')
        echo "device_id=${DEVICE_ID}" >> $GITHUB_OUTPUT
        echo "device=platform=iOS Simulator,name=${DEVICE_NAME},OS=${OS_VERSION}" >> $GITHUB_OUTPUT
        echo "Using simulator: ${DEVICE_NAME} (iOS ${OS_VERSION}) UDID=${DEVICE_ID}"
