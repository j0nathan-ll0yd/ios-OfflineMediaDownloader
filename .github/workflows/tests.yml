name: Tests

on:
  pull_request:
    branches: [master, main, develop]
    paths:
      - 'App/**'
      - 'OfflineMediaDownloaderTests/**'
      - 'OfflineMediaDownloader.xcodeproj/**'
      - 'OfflineMediaDownloaderUITests/**'
      - 'APITypes/**'
      - 'Packages/**'
      - 'Scripts/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.swiftlint.yml'
      - '.swiftformat'
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/dependabot.yml'
  push:
    branches: [master, main, develop]
    paths:
      - 'App/**'
      - 'OfflineMediaDownloaderTests/**'
      - 'OfflineMediaDownloader.xcodeproj/**'
      - 'OfflineMediaDownloaderUITests/**'
      - 'APITypes/**'
      - 'Packages/**'
      - 'Scripts/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.swiftlint.yml'
      - '.swiftformat'
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/dependabot.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SCHEME: OfflineMediaDownloader
  PROJECT: OfflineMediaDownloader.xcodeproj

jobs:
  pr-title:
    name: PR Title (Conventional Commits)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017  # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            refactor
            test
            style
            ci
            docs
            perf
            revert
            deps

  lint:
    name: Lint (conventions, SwiftLint, SwiftFormat, ShellCheck)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Validate iOS version targets
        run: bash Scripts/validate-ios-version.sh

      - name: Validate TCA patterns
        run: bash Scripts/validate-tca-patterns.sh

      - name: SwiftLint
        uses: norio-nomura/action-swiftlint@9f4dcd7fd46b4e75d7935cf2f4df406d5cae3684  # 3.2.1
        env:
          DIFF_BASE: ${{ github.base_ref }}

      - name: Install SwiftFormat
        run: |
          set -e
          SWIFTFORMAT_VERSION=0.60.1
          curl -fsSL -o swiftformat_linux.zip \
            "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat_linux.zip"
          unzip -q swiftformat_linux.zip
          chmod +x swiftformat_linux
          sudo mv swiftformat_linux /usr/local/bin/swiftformat
          swiftformat --version

      - name: SwiftFormat (lint mode)
        run: swiftformat --lint .

      - name: ShellCheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck Scripts/*.sh

  apitypes-build:
    name: APITypes Build (SPM)
    needs: lint
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-xcode-env
      - name: Build APITypes package
        run: xcrun swift build --package-path APITypes --disable-sandbox

  test:
    name: Test (build + unit + snapshots + warnings)
    needs: lint
    runs-on: macos-15
    timeout-minutes: 45
    env:
      SNAPSHOT_TESTING_RECORD: never
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-xcode-env
        id: env

      - uses: irgaly/xcode-cache@fd644652c5d3fd1f794edcdf839eb1dc03a9021f  # v1.8.1
        with:
          key: xcode-deriveddata-${{ runner.os }}-${{ hashFiles('**/*.pbxproj', '**/Package.resolved') }}
          restore-keys: |
            xcode-deriveddata-${{ runner.os }}-

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Boot simulator
        run: |
          DEVICE_ID="${{ steps.env.outputs.device_id }}"
          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          for i in {1..30}; do
            if xcrun simctl list devices | grep "$DEVICE_ID" | grep -q "Booted"; then
              echo "Simulator ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "id=${{ steps.env.outputs.device_id }}" \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log | xcbeautify --report junit --report-path build-results.xml

      - name: Check build warnings
        run: bash Scripts/check-build-warnings.sh

      - name: Run tests (including snapshots)
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "id=${{ steps.env.outputs.device_id }}" \
            -resultBundlePath TestResults.xcresult \
            -test-timeouts-enabled YES \
            -maximum-test-execution-time-allowance 120 \
            -parallel-testing-enabled YES \
            -only-testing:OfflineMediaDownloaderTests \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee test.log | xcbeautify --report junit --report-path test-results.xml

      - name: Upload test results (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            TestResults.xcresult
            test-results.xml
            build-results.xml
          retention-days: 7

      - name: Upload snapshot failures (failure only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-failures
          path: |
            **/__Snapshots__/**/*.png
            **/*.diff.png
          retention-days: 3

      - name: Test Summary
        if: always()
        run: |
          if [ -f test-results.xml ]; then
            echo "### Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            TESTS=$(grep -o 'tests="[0-9]*"' test-results.xml 2>/dev/null | head -1 | grep -o '[0-9]*' || echo "0")
            FAILURES=$(grep -o 'failures="[0-9]*"' test-results.xml 2>/dev/null | head -1 | grep -o '[0-9]*' || echo "0")
            if [ -z "$TESTS" ]; then TESTS="0"; fi
            if [ -z "$FAILURES" ]; then FAILURES="0"; fi
            if [ "$FAILURES" = "0" ]; then
              echo "All $TESTS tests passed" >> $GITHUB_STEP_SUMMARY
            else
              echo "$FAILURES of $TESTS tests failed" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### Test Results" >> $GITHUB_STEP_SUMMARY
            echo "No test results file found" >> $GITHUB_STEP_SUMMARY
          fi

  release-build:
    name: Release Archive (no codesign)
    needs: lint
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-xcode-env

      - uses: irgaly/xcode-cache@fd644652c5d3fd1f794edcdf839eb1dc03a9021f  # v1.8.1
        with:
          key: xcode-deriveddata-release-${{ runner.os }}-${{ hashFiles('**/*.pbxproj', '**/Package.resolved') }}
          restore-keys: |
            xcode-deriveddata-release-${{ runner.os }}-

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Archive (no codesign)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -archivePath build/OfflineMediaDownloader.xcarchive \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            2>&1 | tee release-build.log | xcbeautify
