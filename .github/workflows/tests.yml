# Companion repo dispatch pattern — security-safe self-hosted runner access.
#
# This is a PUBLIC repository. If CI jobs ran directly on self-hosted runners
# here, a fork PR could execute arbitrary code on our private Mac Studio hardware.
#
# The actual CI jobs (pr-title, lint, apitypes-build, test, release-build) live in
# the PRIVATE companion repo: j0nathan-ll0yd/ci-runners-private
# at .github/workflows/ios-omd-tests.yml
#
# Prerequisite: the companion repo must allow workflow access from this repo.
# Settings > Actions > General > Access > "Accessible from repositories in the
# 'j0nathan-ll0yd' account" (or specifically this repo).

name: Tests

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'App/**'
      - 'ShareExtension/**'
      - 'OfflineMediaDownloaderTests/**'
      - 'OfflineMediaDownloader.xcodeproj/**'
      - 'OfflineMediaDownloaderUITests/**'
      - 'APITypes/**'
      - 'Packages/**'
      - 'Scripts/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.swiftlint.yml'
      - '.swiftformat'
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/dependabot.yml'
  push:
    branches: [main, develop]
    paths:
      - 'App/**'
      - 'ShareExtension/**'
      - 'OfflineMediaDownloaderTests/**'
      - 'OfflineMediaDownloader.xcodeproj/**'
      - 'OfflineMediaDownloaderUITests/**'
      - 'APITypes/**'
      - 'Packages/**'
      - 'Scripts/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.swiftlint.yml'
      - '.swiftformat'
      - '.github/workflows/**'
      - '.github/actions/**'
      - '.github/dependabot.yml'

permissions:
  contents: read

jobs:
  ci:
    uses: j0nathan-ll0yd/ci-runners-private/.github/workflows/ios-omd-tests.yml@main
    with:
      ref: ${{ github.event.pull_request.head.sha || github.sha }}
      head_ref: ${{ github.head_ref || '' }}
    secrets: inherit
